<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To Do List App</title>
  </head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: #0f172a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .container {
      width: 90%;
      max-width: 500px;
      background-color: #1e293b;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
      font-size: 32px;
    }

    .input-section {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .input-section input {
      flex: 1;
      padding: 12px 15px;
      border: none;
      border-radius: 10px;
      outline: none;
      font-size: 16px;
    }

    .input-section button {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background-color: #3b82f6;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .input-section button:hover {
      background-color: #2563eb;
    }

    .filter-section {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 20px;
    }

    .filter-section button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background-color: #334155;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .filter-section button:hover {
      background-color: #475569;
    }

    #taskList {
      list-style: none;
    }

    #taskList li {
      background-color: #334155;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .task-text {
      flex: 1;
      font-size: 16px;
    }

    .completed {
      text-decoration: line-through;
      opacity: 0.6;
    }

    .task-buttons {
      display: flex;
      gap: 8px;
    }

    .task-buttons button {
      border: none;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      color: white;
      transition: 0.3s;
    }

    .complete-btn {
      background-color: #22c55e;
    }

    .complete-btn:hover {
      background-color: #16a34a;
    }

    .delete-btn {
      background-color: #ef4444;
    }

    .delete-btn:hover {
      background-color: #dc2626;
    }

    @media (max-width: 600px) {
      .input-section {
        flex-direction: column;
      }

      .filter-section {
        flex-direction: column;
      }

      #taskList li {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }

      .task-buttons {
        width: 100%;
        justify-content: flex-end;
      }
    }
  </style>
  <body>
    <div class="container">
      <h1>To Do List</h1>

      <div class="input-section">
        <input type="text" id="taskInput" placeholder="Masukkan tugas..." />
        <button id="addTaskBtn">Tambah</button>
      </div>

      <div class="filter-section">
        <button id="allBtn">Semua</button>
        <button id="completedBtn">Selesai</button>
        <button id="pendingBtn">Belum Selesai</button>
      </div>

      <ul id="taskList">
        <!-- Task akan muncul di sini -->
      </ul>
    </div>
    <script src="script.js"></script>
  </body>
</html>
